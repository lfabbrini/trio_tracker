<!-- Main response: update the match form -->
{% include "partials/match_form.html" %}

<!-- Out-of-band swaps: update other sections simultaneously -->
<div id="leaderboard" hx-swap-oob="true">
    {% include "partials/leaderboard.html" %}
</div>

<div id="weekly-leaderboard" hx-swap-oob="true">
    {% include "partials/weekly_leaderboard.html" %}
</div>

<div id="recent-matches" hx-swap-oob="true">
    {% include "partials/recent.html" %}
</div>

<div id="win-streaks" hx-swap-oob="true">
    {% include "partials/win_streaks.html" %}
</div>

<div id="podium-days" hx-swap-oob="true">
    {% include "partials/podium_days.html" %}
</div>

{% if commentary %}
<div id="commentator-panel" hx-swap-oob="true" class="commentator-panel">
    <div class="commentator-icon">🎙️</div>
    <div id="commentator-text" class="commentator-text" data-text="{{ commentary }}"></div>
</div>
{% endif %}
